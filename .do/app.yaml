name: vu-exam-system

services:
  - name: backend
    source_dir: backend
    dockerfile_path: Dockerfile
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xs
    routes:
      - path: /api
      - path: /admin
      - path: /media
      - path: /static
      - path: /

static_sites:
  - name: frontend
    source_dir: VU
    build_command: npm ci && npm run build
    output_dir: dist
    index_document: index.html
    error_document: 404.html
